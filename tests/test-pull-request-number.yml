name: Test pull-request-number input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/42/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github-token: fake-token-for-testing
          pull-request-number: "42"
        continue-on-error: true
      - name: Assert action was invoked with pull-request-number
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action will fail because the token is fake and there's no real PR,
          # but we verify it was invoked (not skipped).
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with pull-request-number input"
