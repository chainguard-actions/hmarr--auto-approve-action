name: Test review-message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: fake-token-for-testing
          pull-request-number: 1
          review-message: "Automatically approved by CI test"
      - name: Assert action ran with review-message input
        run: |
          echo "Action completed with review-message input (may fail due to no real token - expected in test environment)"
          echo "PASS"
