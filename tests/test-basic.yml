name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github-token: fake-token-for-testing
        continue-on-error: true
      - name: Assert action ran (may fail due to API call with fake token)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with a fake token since it makes real API calls
          # We just verify it ran and produced an outcome
          if [ -z "${{ steps.action.outcome }}" ]; then
            echo "FAIL: action did not produce an outcome"
            exit 1
          fi
          echo "PASS: action ran and produced outcome: ${{ steps.action.outcome }}"
